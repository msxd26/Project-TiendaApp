<div class="page-header">
  <h2>Categorías</h2>
  @if (canCreate) {
    <button mat-raised-button color="primary" (click)="openForm()"><mat-icon>add</mat-icon> Nueva Categoría</button>
  }
</div>
<mat-form-field appearance="outline">
  <mat-label>Buscar</mat-label>
  <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
  <mat-icon matSuffix (click)="onSearch()" style="cursor:pointer">search</mat-icon>
</mat-form-field>
@if (searchTerm) {
  <button mat-button (click)="searchTerm=''; loadData()"><mat-icon>clear</mat-icon></button>
}

@if (loading()) {
  <mat-spinner class="center-spinner"></mat-spinner>
} @else {
  <table mat-table [dataSource]="data()" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="nombre"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let r">{{ r.nombre }}</td></ng-container>
    <ng-container matColumnDef="descripcion"><th mat-header-cell *matHeaderCellDef>Descripción</th><td mat-cell *matCellDef="let r">{{ r.descripcion }}</td></ng-container>
    <ng-container matColumnDef="estado"><th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let r"><mat-chip [color]="r.estado ? 'primary' : 'warn'" highlighted>{{ r.estado ? 'Activo' : 'Inactivo' }}</mat-chip></td>
    </ng-container>
    <ng-container matColumnDef="acciones"><th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let r">
        @if (canCreate) { <button mat-icon-button color="primary" (click)="openForm(r)"><mat-icon>edit</mat-icon></button> }
        @if (canCreate) { <button mat-icon-button color="warn" (click)="onDelete(r)"><mat-icon>delete</mat-icon></button> }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let r; columns: columns;"></tr>
  </table>
  <mat-paginator [length]="totalElements()" [pageSize]="10" [pageSizeOptions]="[5,10,25]" (page)="onPage($event)" showFirstLastButtons></mat-paginator>
}
