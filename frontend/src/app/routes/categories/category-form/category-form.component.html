<h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nueva' }} Categoría</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre">
      @if (form.get('nombre')?.hasError('required') && form.get('nombre')?.touched) {
        <mat-error>El nombre es requerido</mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" rows="3"></textarea>
      @if (form.get('descripcion')?.hasError('required') && form.get('descripcion')?.touched) {
        <mat-error>La descripción es requerida</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="form.invalid">{{ isEdit ? 'Actualizar' : 'Crear' }}</button>
</mat-dialog-actions>
