<div class="page-header">
  <h2>Gestión de Usuarios</h2>
  <button mat-raised-button color="primary" (click)="onCreate()">
    <mat-icon>add</mat-icon> Nuevo Usuario
  </button>
</div>
@if (loading()) { <mat-spinner class="center-spinner"></mat-spinner> } @else {
  <table mat-table [dataSource]="data()" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="nombre"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let r">{{r.nombre}}</td></ng-container>
    <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let r">{{r.email}}</td></ng-container>
    <ng-container matColumnDef="estado"><th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let r"><mat-chip [color]="r.estado?'primary':'warn'" highlighted>{{r.estado ? 'Activo' : 'Inactivo'}}</mat-chip></td>
    </ng-container>
    <ng-container matColumnDef="roles"><th mat-header-cell *matHeaderCellDef>Roles</th>
      <td mat-cell *matCellDef="let r">
        <mat-chip-set>
          @for (rol of r.role; track rol.idrol) {
            <mat-chip>{{rol.nombre.replace('ROLE_','')}}</mat-chip>
          }
        </mat-chip-set>
      </td>
    </ng-container>
    <ng-container matColumnDef="acciones"><th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button color="warn" (click)="onDelete(r)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let r; columns: columns;"></tr>
  </table>
}
