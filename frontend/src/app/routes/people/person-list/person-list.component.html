<div class="page-header">
  <h2>Personas</h2>
  @if (canCreate) {
    <button mat-raised-button color="primary" (click)="openForm()"><mat-icon>add</mat-icon> Nueva Persona</button>
  }
</div>
@if (loading()) { <mat-spinner class="center-spinner"></mat-spinner> } @else {
  <table mat-table [dataSource]="data()" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="nombre"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let r">{{r.nombre}}</td></ng-container>
    <ng-container matColumnDef="tipoPersona"><th mat-header-cell *matHeaderCellDef>Tipo</th><td mat-cell *matCellDef="let r">{{r.tipoPersona}}</td></ng-container>
    <ng-container matColumnDef="numDocumento"><th mat-header-cell *matHeaderCellDef>Documento</th><td mat-cell *matCellDef="let r">{{r.tipoDocumento}} - {{r.numDocumento}}</td></ng-container>
    <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let r">{{r.email}}</td></ng-container>
    <ng-container matColumnDef="telefono"><th mat-header-cell *matHeaderCellDef>Teléfono</th><td mat-cell *matCellDef="let r">{{r.telefono}}</td></ng-container>
    <ng-container matColumnDef="acciones"><th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let r">
        @if (canEdit) { <button mat-icon-button color="primary" (click)="openForm(r)"><mat-icon>edit</mat-icon></button> }
        @if (canDelete) { <button mat-icon-button color="warn" (click)="onDelete(r)"><mat-icon>delete</mat-icon></button> }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let r; columns: columns;"></tr>
  </table>
  <mat-paginator [length]="total()" [pageSize]="10" [pageSizeOptions]="[5,10,25]" (page)="onPage($event)" showFirstLastButtons></mat-paginator>
}
